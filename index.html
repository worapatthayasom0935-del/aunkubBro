<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mangosteen Health Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4A154B; /* สีม่วงมังคุด */
            --secondary: #6B2D5C;
            --accent: #8EC540; /* สีเขียวใบไม้ */
            --danger: #E74C3C;
            --warning: #F39C12;
            --light: #F9F6FA;
            --dark: #2C1A2D;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Anuphan', sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.6;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        header h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
        }

        header p {
            font-weight: 300;
            opacity: 0.9;
        }

        /* Main Container */
        .container {
            max-width: 800px;
            margin: -20px auto 40px;
            padding: 0 20px;
        }

        /* Scanner Box */
        .scanner-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            margin-bottom: 2rem;
        }

        .camera-box {
            width: 100%;
            max-width: 450px;
            height: 300px;
            background: #e0e0e0;
            margin: 0 auto 1.5rem;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            border: 4px solid var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* แอนิเมชันเส้นสแกนเรียลไทม์ */
        .scan-laser {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            animation: scanning 2s linear infinite;
            display: none;
        }

        @keyframes scanning {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .placeholder-text {
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .btn-accent {
            background: var(--accent);
            color: white;
        }

        .btn-accent:hover {
            background: #76ab35;
        }

        /* Results Section */
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: none; /* ซ่อนไว้ก่อนสแกน */
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .severity-badge {
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .severity-high { background-color: var(--danger); }
        .severity-medium { background-color: var(--warning); }

        .info-section {
            margin-bottom: 1.5rem;
        }

        .info-section h3 {
            color: var(--primary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-section ul {
            padding-left: 20px;
        }

        .info-section li {
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-seedling"></i> Mangosteen Care</h1>
        <p>ระบบสแกนวิเคราะห์โรคใบ กิ่ง และผลมังคุดแบบเรียลไทม์ด้วย AI</p>
    </header>

    <div class="container">
        <section class="scanner-card">
            <div class="camera-box" id="cameraBox">
                <div class="scan-laser" id="laser"></div>
                <video id="video" autoplay playsinline style="display: none;"></video>
                <div class="placeholder-text" id="placeholder">
                    <i class="fa-solid fa-camera style='font-size: 3rem; color: #ccc; mb-2'"></i>
                    <p>กดปุ่มด้านล่างเพื่อเปิดกล้องสแกน</p>
                </div>
            </div>
            
            <div class="btn-group">
                <button class="btn" id="startBtn"><i class="fa-solid fa-camera"></i> เปิดกล้องเรียลไทม์</button>
                <button class="btn btn-accent" id="scanBtn" disabled><i class="fa-solid fa-qrcode"></i> สแกนวิเคราะห์โรค</button>
            </div>
        </section>

        <section class="result-card" id="resultCard">
            <div class="result-header">
                <h2>ผลการตรวจ: <span id="diseaseName" style="color: var(--primary);"></span></h2>
                <span class="severity-badge" id="severityRating"></span>
            </div>

            <div class="info-section">
                <h3><i class="fa-solid fa-triangle-exclamation"></i> ระดับความร้ายแรงและอาการ</h3>
                <p id="dangerDetails"></p>
            </div>

            <div class="info-section">
                <h3><i class="fa-solid fa-hand-holding-medical"></i> วิธีการดูแลรักษาและป้องกัน</h3>
                <ul id="treatmentDetails">
                    </ul>
            </div>
        </section>
    </div>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const scanBtn = document.getElementById('scanBtn');
        const laser = document.getElementById('laser');
        const placeholder = document.getElementById('placeholder');
        const resultCard = document.getElementById('resultCard');

        // ข้อมูลจำลองสำหรับใช้นำเสนอ (Presentation Demo)
        const mockDiseases = [
            {
                name: "โรคใบจุดสนิม (Leaf Rust)",
                severity: "ปานกลาง",
                severityClass: "severity-medium",
                danger: "เกิดจากเชื้อรา ทำให้เกิดจุดสีสนิมบนใบ หากปล่อยไว้ใบจะร่วงหล่นก่อนกำหนด ส่งผลให้ต้นมังคุดสังเคราะห์แสงได้น้อยลง และการเจริญเติบโตชะงัก",
                treatment: [
                    "ตัดแต่งกิ่งให้ทรงพุ่มโปร่ง เพื่อให้อากาศถ่ายเทและแสงแดดส่องถึง",
                    "พ่นสารป้องกันกำจัดเชื้อรากลุ่มคอปเปอร์อ็อกซีคลอไรด์",
                    "เก็บกวาดใบที่ร่วงหล่นออกจากแปลงไปเผาทำลายเพื่อลดการสะสมของเชื้อ"
                ]
            },
            {
                name: "โรคผลเน่าและยางไหล (Fruit Rot & Gummosis)",
                severity: "ร้ายแรงสูง",
                severityClass: "severity-high",
                danger: "ส่งผลกระทบต่อกิ่งและผลโดยตรง! เชื้อราเข้าทำลายทำให้มียางไหลเยิ้มออกมาตามเปลือก กิ่งแห้งตาย และผลมังคุดเน่าเสีย แข็งกระด้าง ไม่สามารถขายได้",
                treatment: [
                    "หลีกเลี่ยงการทำให้เปลือกหรือกิ่งไม้เกิดแผลในระว่างการเก็บเกี่ยว",
                    "หากพบกิ่งแห้งตายให้รีบตัดไปทำลายนอกสวน แล้วทาแผลด้วยปูนแดง",
                    "ฉีดพ่นสารเคมีป้องกัน เช่น เมทาแลกซิล ในช่วงที่มีฝนตกชุกหนาแน่น"
                ]
            }
        ];

        // ฟังก์ชันเปิดกล้องเรียลไทม์
        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                video.style.display = 'block';
                placeholder.style.display = 'none';
                scanBtn.disabled = false;
                startBtn.innerHTML = `<i class="fa-solid fa-circle-dot" style="color: #2ecc71;"></i> กล้องพร้อมใช้งาน`;
            } catch (err) {
                alert("ไม่สามารถเข้าถึงกล้องได้ แต่ระบบจะใช้โหมดจำลองเพื่อการพรีเซนต์ให้ครับ");
                // Fallback เผื่อเวลารันบนคอมที่ไม่มีกล้อง
                placeholder.innerHTML = "<p>📸 [โหมดจำลองการทำงานกล้องเรียลไทม์]</p>";
                scanBtn.disabled = false;
            }
        });

        // ฟังก์ชันกดสแกนและสุ่มผลลัพธ์ (สร้างสีสันเวลาพรีเซนต์)
        scanBtn.addEventListener('click', () => {
            laser.style.display = 'block'; // แสดงเส้นเลเซอร์สแกน
            scanBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> กำลังวิเคราะห์...`;
            
            // จำลองความเร็วการประมวลผลเสมือนจริง 1.5 วินาที
            setTimeout(() => {
                laser.style.display = 'none';
                scanBtn.innerHTML = `<i class="fa-solid fa-qrcode"></i> สแกนวิเคราะห์โรค`;
                
                // สุ่มโรคขึ้นมาแสดงเพื่อความหลากหลายตอนกดโชว์กรรมการ
                const randomDisease = mockDiseases[Math.floor(Math.random() * mockDiseases.length)];
                
                // ใส่ข้อมูลลงหน้าเว็บ
                document.getElementById('diseaseName').innerText = randomDisease.name;
                
                const badge = document.getElementById('severityRating');
                badge.innerText = randomDisease.severity;
                badge.className = `severity-badge ${randomDisease.severityClass}`;
                
                document.getElementById('dangerDetails').innerText = randomDisease.danger;
                
                const treatmentList = document.getElementById('treatmentDetails');
                treatmentList.innerHTML = '';
                randomDisease.treatment.forEach(item => {
                    const li = document.createElement('li');
                    li.innerText = item;
                    treatmentList.appendChild(li);
                });
                
                // แสดงการ์ดผลลัพธ์
                resultCard.style.display = 'block';
                resultCard.scrollIntoView({ behavior: 'smooth' });
            }, 1500);
        });
    </script>
</body>
</html>
