<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบสแกน QR ผลิตภัณฑ์ยา</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family: Arial,sans-serif;
    background:#f5f7fa;
    text-align:center;
    padding:20px;
}

#reader{
    width:350px;
    margin:auto;
}

.result{
    margin-top:20px;
    padding:20px;
    background:white;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}
</style>
</head>
<body>

<h1>สแกน QR Code ผลิตภัณฑ์ยา</h1>

<div id="reader"></div>

<div class="result" id="result">
    รอสแกน QR Code...
</div>

<script>

// ฐานข้อมูลตัวอย่าง
const medicineDB = {

    "PARA500":{
        name:"Paracetamol 500mg",
        use:"บรรเทาอาการปวด ลดไข้",
        dosage:"ครั้งละ 1-2 เม็ด ทุก 4-6 ชั่วโมง",
        warning:"ไม่ควรเกิน 8 เม็ดต่อวัน"
    },

    "AMOX500":{
        name:"Amoxicillin 500mg",
        use:"ยาปฏิชีวนะรักษาการติดเชื้อแบคทีเรีย",
        dosage:"ตามแพทย์สั่ง",
        warning:"ควรใช้ตามคำแนะนำของแพทย์"
    }

};

function onScanSuccess(decodedText){

    let resultDiv=document.getElementById("result");

    if(medicineDB[decodedText]){

        let med=medicineDB[decodedText];

        resultDiv.innerHTML=`
        <h2>${med.name}</h2>
        <p><b>สรรพคุณ:</b> ${med.use}</p>
        <p><b>วิธีใช้:</b> ${med.dosage}</p>
        <p><b>คำเตือน:</b> ${med.warning}</p>
        `;

    }else{

        resultDiv.innerHTML=`
        <h2>ไม่พบข้อมูลยา</h2>
        <p>QR: ${decodedText}</p>
        `;
    }
}

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
    { facingMode: "environment" },
    {
        fps: 10,
        qrbox: 250
    },
    onScanSuccess
);

</script>

</body>
</html>
