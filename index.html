<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบฐานข้อมูลและวินิจฉัยโรคพืช</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f5;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #2e7d32; text-align: center; }
        .container {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
        }
        label {
            font-size: 16px;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            color: #444;
        }
        select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #2e7d32;
            background-color: #fff;
            cursor: pointer;
            outline: none;
            margin-bottom: 25px;
        }
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
        }
        .danger-high { background-color: #d32f2f; }
        .danger-medium { background-color: #f57c00; }
        .danger-low { background-color: #388e3c; }
        .info-section { 
            margin-top: 15px; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 12px; 
        }
        .info-title { font-weight: bold; color: #2e7d32; display: block; margin-bottom: 5px; }
        .result-box { display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>🌿 ระบบข้อมูลโรคพืชและแนวทางการรักษา</h1>
    
    <div class="container">
        <label for="diseaseSelect">🔎 เลือกโรคพืชที่ต้องการดูข้อมูล:</label>
        <select id="diseaseSelect" onchange="showDiseaseInfo()">
            <option value="">-- กรุณาเลือกโรคพืช --</option>
            <option value="0">โรครากเน่าโคนเน่า (Phytophthora)</option>
            <option value="1">โรคราสีชมพู (Pink Disease)</option>
            <option value="2">โรคเปลือกแตกยางไหล (Stem Canker)</option>
        </select>

        <div id="resultBox" class="result-box">
            <div class="info-section">
                <span class="info-title">ระดับความร้ายแรง:</span> 
                <span id="resSeverity" class="badge">-</span>
            </div>
            <div class="info-section">
                <span class="info-title">🍂 อาการที่พบบนใบ:</span> 
                <span id="resLeaf">-</span>
            </div>
            <div class="info-section">
                <span class="info-title">🛠️ แนวทางการแก้ไขและรักษา:</span> 
                <span id="resSolution">-</span>
            </div>
            <div class="info-section">
                <span class="info-title">⏳ ระยะเวลาการรักษา:</span> 
                <span id="resDuration">-</span>
            </div>
        </div>
    </div>

    <script>
        // ชุดข้อมูลที่คุณสามารถเข้ามาแก้ไข/เพิ่มลดข้อความตรงนี้ได้เลยครับ
        const diseaseDatabase = [
            {
                severity: "ร้ายแรงสูง",
                severityClass: "danger-high",
                leaf: "ใบมีอาการเหลืองซีดจากเส้นกลางใบ ใบสลดเหี่ยว และหลุดร่วงง่ายผิดปกติ",
                solution: "ขูดผิวเปลือกบริเวณลำต้นที่เน่าออก ทาด้วยปูนแดงหรือสารเคมีเมทาแลกซิล งดให้น้ำชั่วคราวและปรับปรุงการระบายน้ำในดิน",
                duration: "2 - 4 เดือน (ขึ้นอยู่กับขนาดแผลและความแข็งแรงของต้น)"
            },
            {
                severity: "ปานกลาง",
                severityClass: "danger-medium",
                leaf: "ใบบนกิ่งที่เป็นโรคจะเริ่มมีสีเหลือง เหี่ยวแห้ง และค้างติดอยู่บนกิ่งไม่ยอมร่วงหล่นลงพื้น",
                solution: "ตัดแต่งกิ่งที่เป็นโรคไปเผาทำลายทันที พ่นสารเคมีป้องกันกำจัดเชื้อรากลุ่มทองแดง (Copper) บริเวณง่ามกิ่งและลำต้น",
                duration: "3 - 6 สัปดาห์"
            },
            {
                severity: "ร้ายแรงสูง",
                severityClass: "danger-high",
                leaf: "ใบมีขนาดเล็กลง สีไม่สมบูรณ์ มีอาการขอบใบไหม้แห้งในระยะรุนแรง ต้นดูโทรม",
                solution: "ใช้มีดสะอาดถากเปลือกไม้ส่วนที่เสียออกให้หมด ทาสารป้องกันกำจัดเชื้อรา เช่น ฟอสอีทิล-อลูมิเนียม บำรุงต้นด้วยปุ๋ยที่มีโพแทสเซียมสูง",
                duration: "1 - 3 เดือน"
            }
        ];

        function showDiseaseInfo() {
            const selectElement = document.getElementById('diseaseSelect');
            const resultBox = document.getElementById('resultBox');
            const selectedValue = selectElement.value;

            // ถ้าไม่ได้เลือกโรคอะไรเลย ให้ซ่อนกล่องผลลัพธ์
            if (selectedValue === "") {
                resultBox.style.display = "none";
                return;
            }

            // ดึงข้อมูลจากฐานข้อมูลตาม Index ที่เลือก
            const diseaseData = diseaseDatabase[selectedValue];

            // นำข้อมูลไปใส่ใน HTMLแต่ละจุด
            document.getElementById('resLeaf').innerText = diseaseData.leaf;
            document.getElementById('resSolution').innerText = diseaseData.solution;
            document.getElementById('resDuration').innerText = diseaseData.duration;
            
            // ปรับสีและข้อความของป้ายความร้ายแรง
            const severityBadge = document.getElementById('resSeverity');
            severityBadge.innerText = diseaseData.severity;
            severityBadge.className = `badge ${diseaseData.severityClass}`;

            // แสดงกล่องผลลัพธ์
            resultBox.style.display = "block";
        }
    </script>
</body>
</html>
